<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#0f172a" />

    <!-- 인터넷 창 맨 위에 뜰 우리 웹사이트 이름이에요! -->
    <title>버츄얼 종겜 리그</title>

    <!-- 1. 예쁜 한글 폰트 (Noto Sans KR) 가져오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <!-- 2. 디자인 마법 가루 (Tailwind CSS) 뿌리기! (이게 있어야 색깔이 입혀져요) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 3. 가져온 폰트를 우리 웹사이트 기본 글씨체로 설정하기 -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Noto Sans KR"', "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>

  <!-- ... 윗부분 생략 ... -->
  <body>
    <!-- 자바스크립트가 꺼져있는 아주 옛날 컴퓨터를 위한 안내문구 -->
    <noscript>이 웹사이트를 보려면 자바스크립트를 켜주세요.</noscript>

    <!-- 우리가 만든 React 코드(App.jsx)가 쏙! 들어갈 뼈대 자리입니다. -->
    <div id="root"></div>

    <!-- 👇 바로 이 부분이 빠져있었습니다! React 엔진(index.js)을 실행시키는 연결 고리입니다. 👇 -->
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
